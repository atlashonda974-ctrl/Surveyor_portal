<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atlas Insurance — Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Inter",sans-serif}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#0d73c6 40%, #f7fbff 40%);
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  max-width:1100px;
  width:100%;
  display:flex;
  gap:32px;
  padding:10px;
}

.card{
  display:flex;
  width:100%;
  background:#ffffff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 18px 40px rgba(0,0,0,.08);
}

.left{
  flex:1.2;
  background:linear-gradient(180deg,#e9f4ff 0%,#f3f9ff 85%);
  padding:45px 45px 20px;
  position:relative;
}

.left img.logo{
  width:180px;
}

.left h2{
  margin-top:22px;
  font-size:26px;
  color:#0d2545;
}

.left p{
  margin-top:6px;
  color:#3a4a63;
  line-height:1.5;
}

.features{
  margin-top:22px;
}

.features li{
  list-style:none;
  margin:12px 0;
  display:flex;
  gap:10px;
  color:#1c2e45;
}

.illustration{
  position:absolute;
  bottom:10px;
  right:20px;
  width:270px;
  opacity:.95;
}

.right{
  flex:1;
  padding:55px 45px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.right h3{
  font-size:20px;
  margin-bottom:25px;
  color:#0d2545;
}

.input-icon{
  position:relative;
  margin-bottom:18px;
}

.input-icon i{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  color:#7e8ca3;
}

input{
  width:100%;
  padding:13px 14px 13px 40px;
  border:1px solid #d9e2ef;
  border-radius:10px;
}

.actions{
  text-align:right;
  margin:4px 0 20px;
}

.actions a{
  font-size:12px;
  color:#0d73c6;
  text-decoration:none;
}

button{
  width:100%;
  border:none;
  border-radius:10px;
  padding:14px;
  background:#0d73c6;
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

button:hover{background:#0b66af}

.register{
  margin-top:16px;
  font-size:13px;
  text-align:center;
}

.register a{
  color:#0d73c6;
}

@media(max-width:900px){
  .card{flex-direction:column}
  .illustration{display:none}
}
.instruction-text {
    color: #3a4a63;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 20px;
    text-align: center;
    padding: 0 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="left">
      <img style="width:70%;" class="logo" src="Logo.png" />

      <h2>Welcome to Atlas Insurance.</h2>
      <p>Your trusted partner for a secure future.</p>

      <ul class="features">
        <li><i class="fa-solid fa-shield-halved"></i>General Insurance</li>
        <li><i class="fa-solid fa-car"></i>Motor & Travel Cover</li>
        <li><i class="fa-solid fa-fire-extinguisher"></i>Marine & Fire Protection</li>
        <li><i class="fa-solid fa-hand-holding-heart"></i>Window Takaful Operations</li>
        <li><i class="fa-solid fa-circle-check"></i>AA Rated Financial Strength</li>
      </ul>

      <!-- Illustration (replace with your actual PNG/SVG) -->
      <img class="illustration" src="insu_illustration.png"/>
    </div>

    <div class="right">
      <h3>Login to Your Account</h3>

      <div class="input-icon">
        <i class="fa-regular fa-envelope"></i>
        <input type="email" placeholder="Email Address">
      </div>

      <div class="input-icon">
        <i class="fa-solid fa-lock"></i>
        <input type="password" placeholder="Password">
      </div>

      <div class="actions">
        <a href="#">Forgot Password?</a>
      </div>

      <button>Login</button>

      <div class="register">
        
      </div>
    </div>

  </div>
</div>

</body>
</html>
